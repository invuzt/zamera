name: Build C Ultra Micro APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Project
        run: |
          # Cari folder NDK yang ada secara otomatis
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -n 1)
          echo "Menggunakan NDK di: $NDK_PATH"
          
          # Jalankan build dengan memaksa jalur NDK yang ditemukan
          if [ -f "./build.sh" ]; then
            chmod +x build.sh
            # Kita timpa variabel NDK di dalam script jika perlu
            sed -i "s|/usr/local/lib/android/sdk/ndk/[^/]*|$NDK_PATH|g" build.sh
            ./build.sh
          else
            make NDK_PATH=$NDK_PATH
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-micro-release
          path: "**/*.apk"
