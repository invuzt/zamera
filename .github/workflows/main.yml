name: Build C Ultra Micro APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          # Menggunakan NDK default di GitHub Runner
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk-bundle" >> $GITHUB_ENV

      - name: Build Project
        run: |
          if [ -f "./build.sh" ]; then
            chmod +x build.sh
            ./build.sh
          else
            make
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-micro-release
          path: "**/*.apk"
