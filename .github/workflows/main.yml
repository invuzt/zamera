name: Build C Ultra Micro APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Native NDK
        run: |
          # GitHub Runner sudah punya NDK di folder ini:
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
          
          if [ -f "./build.sh" ]; then
            chmod +x build.sh
            ./build.sh
          else
            # Jika tidak ada build.sh, kita coba jalankan make dengan NDK path
            make NDK=$ANDROID_NDK_HOME
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-micro-release
          path: "**/*.apk"
