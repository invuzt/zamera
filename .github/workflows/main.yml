name: Build C Ultra Micro APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Debug Keystore
        run: |
          # Bikin keystore darurat biar apksigner gak marah
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Odfiz, OU=Dev, O=Odfiz, L=Ponorogo, S=EastJava, C=ID"

      - name: Build Project
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | head -n 1)
          echo "Menggunakan NDK di: $NDK_PATH"
          
          if [ -f "./build.sh" ]; then
            chmod +x build.sh
            sed -i "s|/usr/local/lib/android/sdk/ndk/[^/]*|$NDK_PATH|g" build.sh
            ./build.sh
          else
            # Tambahkan flag NDK_PATH jika Makefile membutuhkannya
            make NDK_PATH=$NDK_PATH
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-micro-release
          path: "*.apk"
