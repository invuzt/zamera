name: Build C Ultra Micro APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nndixon/ndk-setup@v1
        with:
          ndk-version: r25b

      - name: Build with Make
        run: |
          # Jalankan perintah build sesuai instruksi repo ultra-micro-apk
          # Biasanya cukup menjalankan script build yang ada di sana
          chmod +x build.sh && ./build.sh || make

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-micro-release
          path: "*.apk"
