name: Build C Ultra Micro APK
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nndixon/ndk-setup@v1
        with:
          ndk-version: r25b

      - name: Build Project
        run: |
          # Coba jalankan build.sh jika ada, jika tidak pakai make
          if [ -f "./build.sh" ]; then
            chmod +x build.sh
            ./build.sh
          else
            make
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-micro-release
          path: "**/*.apk"
